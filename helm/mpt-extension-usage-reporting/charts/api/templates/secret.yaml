apiVersion: v1
kind: Secret
metadata:
  namespace: {{ .Release.Namespace }}
  name: {{ include "common.fullname" . }}
  labels:
    {{- include "common.labels" . | nindent 4 }}
data:
  MPT_API_TOKEN: {{ .Values.global.MpApiToken }}
  MPT_DATABASE_URL: {{ .Values.global.MptDatabaseUrl }}
  SDK_APPLICATIONINSIGHTS_CONNECTION_STRING: {{ .Values.global.SdkApplicationInsightsConnectionString }}
  SDK_EXTENSION_API_KEY: {{ .Values.global.SdkExtensionApiKey }}
