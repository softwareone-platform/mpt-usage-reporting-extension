services:
  backend:
    build:
      context: .
      target: dev
    command: "uv run mpt-ext run"
    depends_on:
      jaeger:
        condition: service_started
    volumes:
      - ./backend:/extension
    env_file:
      - path: backend/.env
        required: false
    ports:
      - "8080:8080"

  jaeger:
    image: jaegertracing/jaeger:2.17.0
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
      - "4318:4318"
