# This is a YAML-formatted file.
# Declare variables to be passed into the api subchart templates.

cliVersion: 2.4.0
owner: turing
git:
  repository: mpt-extension-usage-reporting
image:
  repository: /mpt-extension-usage-reporting
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: ""

podSecurityContext: {}

securityContext: {}

accessPolicy: public
accessPolicyAudience: any
# Type of app: test, product, infra
type: product
applicationGroup: pyra-cli

# Istio VirtualService routing for the API. Override hosts/gateways per environment.
ingress:
  hosts:
    - customer-api.domain.global
    - extensions-api.domain.global
  gateways:
    - pyra/ops-pyc-cluster-gateway
  forward:
    - match: /mpt-extension-usage-reporting-api/
      rewrite: /

resources: {}

nodeSelector: {}

tolerations: []
