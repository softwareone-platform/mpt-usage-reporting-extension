# Parent chart values for mpt-extension-usage-reporting.
# `global` is shared with the api and worker subcharts.

owner: sirius
type: product
cliVersion: 2.4.0
git:
  repository: mpt-usage-reporting-extension

global:
  # Registry prefix prepended to image.repository (e.g. "myregistry.azurecr.io").
  registryUrl: ""
  # Replica count for the API deployment.
  replicaCountAPI: 1
  # Replica count for the worker (consumer) deployment.
  replicaCountWorker: 1

  # Environment configuration (wired into both subcharts via ConfigMap/Secret).
  # MPT_API_BASE_URL: SoftwareOne Marketplace API URL.
  MpBaseUrl: "https://api.platform.softwareone.com"
  # MPT_API_TOKEN: SoftwareOne Marketplace API token, base64-encoded.
  MpApiToken: ZGVmYXVsdA==
  # MPT_PRODUCTS_IDS: comma-separated Marketplace product ids the API/events process binds to.
  MpProductsIds: default
  # MPT_DATABASE_URL: PostgreSQL connection string, base64-encoded. Required at
  # runtime by every command that touches the store and by the schema migrations.
  MptDatabaseUrl: ZGVmYXVsdA==
  MptDatabaseEntraAuth: "true"
  # MPT_TEAMS_NOTIFICATIONS_ENABLED: report run/recalculate executions to MS Teams.
  MptTeamsNotificationsEnabled: "true"
  # MPT_MSTEAMS_WEBHOOK_URL: MS Teams webhook URL for run reporting, base64-encoded.
  MptMsteamsWebhookUrl: ZGVmYXVsdA==
  MpToolStorageType: local
  SdkExtensionId: EXT-2415-5207
  SdkExtensionUrl: https://EXT-2415-5207.ext.s1.show
  SdkExtensionApiKey: ZGVmYXVsdA==
  SdkOtelServiceName: Swo.Extension.UsageReporting
  SdkObservabilityEnabled: "false"
  SdkApplicationInsightsConnectionString: ZGVmYXVsdA==

  # CronJobs keyed by name (rendered by the worker subchart) as
  # "{worker-fullname}-cronjob-{name}" running {command} on {schedule}.
  cronjobs:
    billing-subscription-usage:
      # Cron schedule (UTC). Empty disables scheduling at deploy time.
      schedule: "0 2 * * *"
      # Console command invoked by the job.
      command: mpt-billing-subscription-usage run
