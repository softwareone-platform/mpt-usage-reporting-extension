# Parent chart values for mpt-usage-reporting-extension.
# `global` is shared with the api and worker subcharts; the top-level label keys
# are used by the parent-level PersistentVolumeClaim.

owner: turing
type: product
cliVersion: 2.4.0
git:
  repository: mpt-usage-reporting-extension

global:
  # Registry prefix prepended to image.repository (e.g. "myregistry.azurecr.io").
  registryUrl: ""
  # Replica count for the API deployment.
  replicaCountAPI: 1
  # Replica count for the worker (consumer) deployment.
  replicaCountWorker: 1

  # Environment configuration (wired into both subcharts via ConfigMap/Secret).
  # MPT_API_BASE_URL: SoftwareOne Marketplace API URL.
  MpBaseUrl: "https://api.platform.softwareone.com"
  # MPT_API_TOKEN: SoftwareOne Marketplace API token, base64-encoded.
  MpApiToken: ZGVmYXVsdA==
  # MPT_PRODUCTS_IDS: comma-separated Marketplace product ids the API/events process binds to.
  MpProductsIds: default
  # MPT_BSU_DB_PATH: SQLite database path. Should live under persistence.mountPath.
  MptBsuDbPath: /data/bsu.db

  # Shared persistent storage mounted at /data for the SQLite database. It is
  # mounted by the api deployment, the worker deployment, and the worker CronJob,
  # so the access mode must allow multi-pod access (ReadWriteMany) unless all pods
  # are co-scheduled on one node.
  persistence:
    enabled: true
    claimName: mpt-usage-reporting-extension-data
    mountPath: /data
    size: 1Gi
    accessMode: ReadWriteMany
    # StorageClass for the PVC. Empty uses the cluster default. Must support the
    # access mode above (ReadWriteMany requires an RWX-capable storage class).
    storageClass: ""
    # Use an existing PVC instead of creating one. When set, no PVC is created.
    # Provisioned by Terraform in ops-platform-infra (module "mpt_usage_reporting_pv")
    # so the volume + data survive helm uninstall/reinstall. Must equal the TF pvc_name.
    existingClaim: mpt-usage-reporting-extension-data

  # CronJobs keyed by name (rendered by the worker subchart) as
  # "{worker-fullname}-cronjob-{name}" running {command} on {schedule}.
  cronjobs:
    billing-subscription-usage:
      # Cron schedule (UTC). Empty disables scheduling at deploy time.
      schedule: "0 2 * * *"
      # Console command invoked by the job.
      command: mpt-billing-subscription-usage
