services:
  backend:
    build:
      context: .
      target: dev
    command: "uv run mpt-ext run"
    depends_on:
      jaeger:
        condition: service_started
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/extension
    env_file:
      - path: backend/.env
        required: false
    ports:
      - "8080:8080"

  jaeger:
    image: jaegertracing/jaeger:2.17.0
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
      - "4318:4318"

  postgres:
    image: postgres:18
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: usage_reporting
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d usage_reporting"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql

volumes:
  postgres-data:
